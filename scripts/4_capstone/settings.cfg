# --- Linter & Formatter Configuration ---

[tool.ruff]
# Same line length as Black
line-length = 120
target-version = "py313"
extend-include = ["*.ipynb"]

[tool.ruff.lint]
# Enable the following rule sets:
# E, W: pycodestyle (standard python errors)
# F: Pyflakes (standard python errors)
# I: isort (imports sorting)
# D: pydocstyle (docstring conventions)
# B: flake8-bugbear (catches common bugs)
select = ["E", "W", "F", "I", "D", "B"]

# Ignore specific conflicts or annoyances
# D100: Missing docstring in public module (optional, often too strict)
# D104: Missing docstring in public package
# D203: One-blank-line-before-class (conflicts with D211)
# D213: Multi-line-summary-second-line (conflicts with D212)
ignore = ["D100", "D104", "D203", "D213"]

[tool.ruff.lint.pydocstyle]
# Enforce Google-style docstrings
convention = "google"

[tool.ruff.lint.isort]
# Tell isort to group imports accurately
known-first-party = ["capstone"]

# --- Tool Specific Configs (if you run them separately) ---

[tool.isort]
# If you run 'isort' directly, this keeps it compatible with Black
profile = "black"
line_length = 120

[tool.pytest.ini_options]
# Configuration for pytest
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
    "src/dashboard/tests",
]